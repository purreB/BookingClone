name: Run Tests

on:
  push:
    branches: ["**"] # every branch push
  pull_request:
    branches: [main] # PRs into main
  workflow_dispatch: # manual run button

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BookingClone/BookingClone.sln

      - name: Build
        run: dotnet build BookingClone/BookingClone.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BookingClone.Tests/BookingClone.Tests.csproj --configuration Release --no-build --verbosity normal
